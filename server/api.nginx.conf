#   sudo apt update && sudo apt install nginx fcgiwrap -y
#   sudo mkdir -p /opt/api
#   # copy server.sh, util.sh, logging-config, users/ into /opt/api
#   sudo chown -R www-data:www-data /opt/api
#   sudo chmod +x /opt/api/server.sh
#   sudo ln -s /etc/nginx/sites-available/bash-api /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # if it conflicts
#   sudo systemctl restart nginx

# Access logging format + destination
include /opt/api/logging-config;

# Rate limiting: 10 req/s per client IP, tracked in a 10MB shared zone.
limit_req_zone $binary_remote_addr zone=per_ip_limit:10m rate=10r/s;

# FastCGI micro-cache: 100MB of keys, 1GB on disk, evicted after 10m idle.
fastcgi_cache_path /var/cache/nginx/api levels=1:2 keys_zone=API_CACHE:100m max_size=1g inactive=10m use_temp_path=off;

map $request_method $skip_cache {
    default 1;
    GET     0;
}

server {
    listen 8080 default_server;
    server_name localhost;

    limit_req zone=per_ip_limit burst=10 nodelay;

    location / {
        fastcgi_pass unix:/var/run/fcgiwrap.socket;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/api/server.sh;

        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;

        fastcgi_cache API_CACHE;
        fastcgi_cache_key "$request_method$request_uri";
        fastcgi_cache_valid 200 2s;

        fastcgi_cache_use_stale error timeout updating invalid_header http_500 http_503;
        fastcgi_cache_lock on;

        add_header X-FastCGI-Cache $upstream_cache_status;
    }
}
