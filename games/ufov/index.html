<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFOV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="../" class="back">&larr; Games</a>
    <h1>UFOV</h1>
    <div class="stats">
      <span>Trial: <b id="trial-num">0</b></span>
      <span>Correct: <b id="correct-num">0</b></span>
    </div>
  </header>
  <main>
    <svg id="stage" viewBox="0 0 500 500" width="500" height="500" aria-label="stimulus stage"></svg>
    <div id="prompt">Press Start to begin.</div>
    <div id="controls">
      <div id="central-choice" class="choice-row hidden">
        <div class="label">Which shape was in the center?</div>
      </div>
      <div id="peripheral-choice" class="choice-row hidden">
        <div class="label" id="peripheral-label">Where was the target shape?</div>
        <div id="dir-grid"></div>
      </div>
      <div id="start-row">
        <button id="start-btn">Start</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>
  </main>
  <script src="game.js"></script>
</body>
</html>
