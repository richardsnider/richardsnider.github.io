<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFOV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="../" class="back">&larr; Games</a>
    <h1>UFOV</h1>
    <div class="stats">
      <span>Trial: <b id="trial-num">0</b></span>
      <span>Correct: <b id="correct-num">0</b></span>
      <span>Flash: <b id="dur-num">500</b>ms</span>
      <span>Level: <b id="level-num">0</b></span>
    </div>
  </header>
  <main>
    <svg id="stage" viewBox="0 0 500 500" width="500" height="500" aria-label="stimulus stage"></svg>
    <div id="prompt">Press Start to begin.</div>
    <div id="controls">
      <div id="central-choice" class="choice-row hidden">
        <div class="label">Center:</div>
        <button data-shape="circle"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="14" fill="#fff"/></svg></button>
        <button data-shape="triangle"><svg viewBox="0 0 40 40"><polygon points="20,6 34,32 6,32" fill="#fff"/></svg></button>
      </div>
      <div id="peripheral-choice" class="choice-row hidden">
        <div class="label">Where was the blue square?</div>
        <div id="dir-grid"></div>
      </div>
      <div id="start-row">
        <button id="start-btn">Start</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>
  </main>
  <script src="game.js"></script>
</body>
</html>
